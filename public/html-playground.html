<body>
  <div class="pg-app">
    <header class="pg-header">
  <div class="title">Daedalus--html playground — HTML/CSS/JS</div>
      <div class="pg-actions">
        <select id="theme-select">
          <option value="default">Light</option>
          <option value="material-darker">Dark</option>
        </select>
        <button id="run-btn" class="btn btn-primary">Run</button>
        <button id="debug-btn" class="btn">Debug</button>
        <button id="export-btn" class="btn">Export</button>
      </div>
    </header>

    <section class="pg-main">
      <aside class="editors">
        <div class="tabs">
          <button class="tab active" data-editor="html">HTML</button>
          <button class="tab" data-editor="css">CSS</button>
          <button class="tab" data-editor="js">JavaScript</button>
        </div>

        <div class="editor-area">
          <div id="html-panel" class="editor-panel active"><textarea id="html-code"></textarea></div>
          <div id="css-panel" class="editor-panel"><textarea id="css-code"></textarea></div>
          <div id="js-panel" class="editor-panel"><textarea id="js-code"></textarea></div>
        </div>

        <div class="editor-footer">
          <span id="status">Ready</span>
          <div class="spacer"></div>
          <button id="clear-btn" class="btn">Clear</button>
        </div>
      </aside>

      <section class="preview">
        <div class="preview-top">
          <div class="preview-title">Live Preview</div>
          <div class="preview-controls">
            <input id="breakpoints-input" placeholder="Breakpoints (e.g. 2,4)" />
            <button id="step-btn" class="btn" disabled>Step</button>
            <button id="continue-btn" class="btn" disabled>Continue</button>
            <button id="stop-btn" class="btn btn-danger" disabled>Stop</button>
          </div>
        </div>

        <iframe id="preview-iframe" sandbox="allow-scripts allow-same-origin"></iframe>

        <div id="debug-console" class="debug-console" style="display:none">
          <strong>Debug Console</strong>
          <div id="debug-console-logs" class="debug-logs"></div>
        </div>
      </section>
    </section>

    <footer class="bg-gray-800 text-white py-8 mt-8">
      <div class="container mx-auto px-4">
        <div class="max-w-4xl mx-auto text-center">
          <p class="mb-2">&copy; 2025 Remote Rise. All rights reserved.</p>

            <a href="contact.html" class="text-sm text-gray-400 hover:text-white mx-2">Contact</a>
          </div>
        </div>
      </div>
    </footer>
  </div>
