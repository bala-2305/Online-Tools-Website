    <script>
        document.addEventListener('DOMContentLoaded', function(){
            const patternInput = document.getElementById('pattern');
            const flagsInput = document.getElementById('flags');
            const textInput = document.getElementById('text');
            const replaceInput = document.getElementById('replace');
            const testBtn = document.getElementById('test-btn');
            const replaceBtn = document.getElementById('replace-btn');
            const matchesEl = document.getElementById('matches');
            const previewEl = document.getElementById('preview');
            const messageEl = document.getElementById('message');

            function escapeHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

            function renderMatches(){
                matchesEl.innerHTML = '';
                previewEl.innerHTML = '';
                if(messageEl) messageEl.textContent = '';
                let patt = patternInput.value || '';
                let flags = flagsInput.value || '';
                let txt = textInput.value || '';
                if(!patt){ if(messageEl) messageEl.textContent = 'Enter a regex pattern.'; return; }
                let re;
                try{ re = new RegExp(patt, flags); }catch(e){ if(messageEl) messageEl.textContent = 'Invalid regex: '+e.message; return; }

                // collect matches
                let m; let i=0; const items = [];
                if(!flags.includes('g')){
                    m = re.exec(txt);
                    if(m){ items.push({match:m[0], index:m.index, groups: m.slice(1)}); }
                } else {
                    while((m = re.exec(txt)) !== null){ items.push({match:m[0], index:m.index, groups: m.slice(1)}); if(m.index===re.lastIndex) re.lastIndex++; }
                }

                if(items.length===0){ if(messageEl) messageEl.textContent = 'No matches found.'; previewEl.innerHTML = escapeHtml(txt); return; }

                // build preview with highlights
                let out = ''; let last = 0;
                for(const it of items){ out += escapeHtml(txt.slice(last,it.index)); out += '<span class="bg-yellow-200 px-1 rounded">'+escapeHtml(it.match)+'</span>'; last = it.index + it.match.length; }
                out += escapeHtml(txt.slice(last)); previewEl.innerHTML = out;

                // list matches
                items.forEach((it,idx)=>{
                    const div = document.createElement('div'); div.className='bg-gray-100 p-3 rounded-md';
                    div.innerHTML = '<strong class="text-gray-800">Match '+(idx+1)+'</strong> <span class="text-gray-500 text-sm">(index: '+it.index+')</span><div class="text-sm text-gray-700 mt-1 font-mono">'+escapeHtml(it.match)+'</div>';
                    if(it.groups && it.groups.length){
                        const ul = document.createElement('ul'); ul.className='text-sm text-gray-600 mt-2 space-y-1';
                        it.groups.forEach((g,gi)=>{ const li=document.createElement('li'); li.innerHTML = 'Group '+(gi+1)+': <code class="bg-gray-200 px-1 rounded">'+escapeHtml(String(g))+'</code>'; ul.appendChild(li); });
                        div.appendChild(ul);
                    }
                    matchesEl.appendChild(div);
                });
            }

            testBtn.addEventListener('click', function(e){ e.preventDefault(); renderMatches(); });

            replaceBtn.addEventListener('click', function(e){
                e.preventDefault();
                let patt = patternInput.value || '';
                let flags = flagsInput.value || '';
                let txt = textInput.value || '';
                let repl = replaceInput.value || '';
                if(!patt){ if(messageEl) messageEl.textContent = 'Enter a regex pattern.'; return; }
                let re;
                try{ re = new RegExp(patt, flags); }catch(e){ if(messageEl) messageEl.textContent = 'Invalid regex: '+e.message; return; }
                try{
                    const out = txt.replace(re, repl);
                    textInput.value = out;
                    renderMatches();
                    if(messageEl) messageEl.textContent = 'Replacement applied.';
                }catch(e){ if(messageEl) messageEl.textContent = 'Replacement error: '+e.message; }
            });

            // live render on input (throttled)
            let t=null; ['input','change'].forEach(ev=>{
                [patternInput,flagsInput,textInput].forEach(el=>el.addEventListener(ev, ()=>{ clearTimeout(t); t=setTimeout(renderMatches, 220); }));
            });

            // initial
            renderMatches();
        });
    </script>
